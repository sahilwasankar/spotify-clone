<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spotify clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
    <script src="script.js"></script>
</head>

<body>
    <div class="container flex   bg-black">

        <div class="left    rounded">
            <div class="home  bg-grey  m1  p-1  rounded">
                <div class="logo invert"><img src="logo.svg" alt=""></div>
                <ul>
                    <li>
                        <img class="invert" src="home.svg" alt="Home">Home
                    </li>
                    <li>
                        <img class="invert" src="search.svg" alt="search">Search
                    </li>
                </ul>
            </div>
            <div class="library bg-grey  rounded   m1 p-1">
                <div class="heading">
                    <div class="playlist invert"><img src="playlist.svg" alt=""></div>
                    <h2>

                        Your library
                    </h2>
                </div>

                <div class="footer">
                    <div><a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/jp/privacy/"><span>Privacy Center</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/"><span>Privacy Policy</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/jp/legal/cookies-policy/"><span>Cookies</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"><span>About Ads</span></a></div>
                    <div><a href="https://www.spotify.com/jp/accessibility/"><span>Accessibility</span></a></div>
                </div>

            </div>
        </div>
        <div class="right   bg-grey  rounded">
            <div class="header">
                <div class="nav">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        color="currentColor" fill="none" stroke="currentColor " stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        color="currentColor" fill="none" stroke="#ffff" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" />
                    </svg>
                </div>
                <div class="buttons">
                    <button>signup</button>
                    <button>login</button>
                </div>
            </div>
            <div class="spotifyplaylist">
                <h1>Spotify Playlists</h1>
                <div class="cardContainer">

                    <div class="card  border">

                        <img aria-hidden="false" draggable="false" loading="lazy"
                            src="https://i.scdn.co/image/ab67616d00001e022ee6259a91835039a96dc674"
                            data-testid="card-image" alt=""
                            class="obD7rdENNc2n3fC0 whMS0fh9Ar4I_GaP WfGUvErXcmIzJo1c qIwhHcbG780QDz68">
                        <h1>Ranjhna</h1>
                        <p>Diljit Dosanjh, Sai, David Guetta</p>
                    </div>

                    <div class="card  border">

                        <img aria-hidden="false" draggable="false" loading="lazy"
                            src="https://i.scdn.co/image/ab67616d00001e022ee6259a91835039a96dc674"
                            data-testid="card-image" alt=""
                            class="obD7rdENNc2n3fC0 whMS0fh9Ar4I_GaP WfGUvErXcmIzJo1c qIwhHcbG780QDz68">
                        <h1>Ranjhna</h1>
                        <p>Diljit Dosanjh, Sai, David Guetta</p>
                    </div>

                </div>

            </div>
        </div>

    </div>
</body>

</html>
